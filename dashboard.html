<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 성과 인텔리전스 - 네이버 + 메타 통합</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--bg2:#181c27;--bg3:#1e2334;--bg4:#252b3b;
    --border:#2e3650;--border2:#3d4a6b;
    --text:#e8ecf4;--text2:#8b95b0;--text3:#5a6380;
    --naver:#00c73c;--meta:#1877f2;--accent:#5b8ff9;
    --success:#34d399;--danger:#f87171;--warn:#fbbf24;
    --r:10px;--r2:6px;
  }
  body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
  .app{max-width:1450px;margin:0 auto;padding:24px 20px}

  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
  .header-left{display:flex;align-items:center;gap:10px}
  .header-left h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
  .live-indicator{display:flex;align-items:center;gap:6px;background:var(--bg3);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
  .dot.live{background:var(--success);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .stext{font-size:12px;color:var(--text2);font-weight:500}

  .control-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:20px;align-items:center}
  .control-group{display:flex;flex-direction:column;gap:8px}
  .control-label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase}

  .date-inputs{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);padding:8px 12px;border-radius:var(--r2)}
  .date-inputs input{background:transparent;border:none;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:130px}
  .date-inputs input::-webkit-calendar-picker-indicator{filter:invert(0.7)}

  .btn-group{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:var(--r2);border:1px solid var(--border)}
  .btn-tab{padding:6px 16px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:4px;transition:all .2s}
  .btn-tab.active{background:var(--bg4);color:var(--text)}
  .btn-tab.active.c-naver{color:var(--naver)}
  .btn-tab.active.c-meta{color:var(--meta)}

  .refresh-btn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--r2);font-weight:700;font-size:13px;cursor:pointer;margin-left:auto;display:flex;align-items:center;gap:8px;transition:transform .1s}
  .refresh-btn:active{transform:scale(0.96)}

  .err-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--danger);padding:14px;border-radius:var(--r2);margin-bottom:20px;font-size:13px;display:none;white-space:pre-line}

  .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
  .m-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:border-color .2s}
  .m-card:hover{border-color:var(--accent)}
  .m-card::after{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
  .m-card.c-spend::after{background:var(--accent)}
  .m-card.c-imp::after{background:#a78bfa}
  .m-card.c-conv::after{background:var(--success)}
  .m-card.c-rev::after{background:var(--warn)}
  .m-label{font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:500}
  .m-value{font-size:26px;font-weight:700;letter-spacing:-0.5px}

  .chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:24px;position:relative}
  .box-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .box-title{font-size:15px;font-weight:700}
  .chart-wrap{height:320px;position:relative}

  .table-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
  .table-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text2)}
  .bc-item{cursor:pointer;transition:color .2s}
  .bc-item:hover{color:var(--text)}
  .bc-item.active{color:var(--accent);font-weight:700;cursor:default}
  .bc-sep{color:var(--text3);font-size:10px}

  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th{padding:12px 20px;background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;text-transform:uppercase;text-align:right;border-bottom:1px solid var(--border);letter-spacing:0.5px;white-space:nowrap}
  th:first-child{text-align:left}
  td{padding:14px 20px;text-align:right;border-bottom:1px solid rgba(46,54,80,0.5);font-size:13px;white-space:nowrap}
  td:first-child{text-align:left;max-width:300px;overflow:hidden;text-overflow:ellipsis}
  tr:hover td{background:var(--bg3)}
  .clickable{color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  .clickable:hover{color:var(--text)}

  .tag{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--bg4);color:var(--text3)}
  .tag.green{background:rgba(52,211,153,0.1);color:var(--success)}
  .tag.blue{background:rgba(24,119,242,0.1);color:var(--meta)}

  .loading-overlay{position:absolute;inset:0;background:rgba(15,17,23,0.8);z-index:20;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;border-radius:var(--r)}
  .loading-overlay.show{display:flex}
  .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .empty-msg{text-align:center;padding:50px;color:var(--text3);font-size:14px}

  @media(max-width:800px){
    .control-panel{flex-direction:column;align-items:stretch}
    .metrics-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>

<div class="app">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <h1>광고 성과 인텔리전스</h1>
      <div class="live-indicator">
        <div class="dot live" id="liveDot"></div>
        <span class="stext" id="statusText">연결 준비됨</span>
      </div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:var(--text3)">Last Sync</div>
      <div style="font-size:12px;color:var(--text2)" id="lastUpdated">-</div>
    </div>
  </div>

  <div class="err-box" id="errBox"></div>

  <!-- 컨트롤 패널 -->
  <div class="control-panel">
    <div class="control-group">
      <span class="control-label">데이터 기간</span>
      <div class="date-inputs">
        <input type="date" id="dateFrom">
        <span style="color:var(--text3)">~</span>
        <input type="date" id="dateTo">
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">플랫폼</span>
      <div class="btn-group" id="platformTabs">
        <button class="btn-tab active" data-p="naver">네이버</button>
        <button class="btn-tab" data-p="meta">메타</button>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">차트 지표</span>
      <div class="btn-group" id="metricTabs">
        <button class="btn-tab active" data-m="spend">광고비</button>
        <button class="btn-tab" data-m="clicks">클릭</button>
        <button class="btn-tab" data-m="conversions">전환</button>
        <button class="btn-tab" data-m="roas">ROAS</button>
      </div>
    </div>

    <button class="refresh-btn" onclick="refresh()">↻ 실시간 새로고침</button>
  </div>

  <!-- 요약 카드 -->
  <div class="metrics-grid" id="metricsGrid">
    <div class="m-card c-spend"><div class="m-label">누적 광고비</div><div class="m-value" id="totSpend">₩0</div></div>
    <div class="m-card c-imp"><div class="m-label">총 노출 / 클릭</div><div class="m-value" id="totImp">0 / 0</div></div>
    <div class="m-card c-conv"><div class="m-label">총 전환수</div><div class="m-value" id="totConv">0</div></div>
    <div class="m-card c-rev"><div class="m-label">전환 매출 (ROAS)</div><div class="m-value" id="totRev">₩0 (0%)</div></div>
  </div>

  <!-- 차트 -->
  <div class="chart-box">
    <div class="loading-overlay" id="chartLoader"><div class="spinner"></div></div>
    <div class="box-header"><span class="box-title" id="chartTitle">일별 추이</span></div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <!-- 테이블 -->
  <div class="table-box">
    <div class="loading-overlay" id="tableLoader"><div class="spinner"></div></div>
    <div class="table-header">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="tag green" id="levelTag">CAMPAIGN</div>
    </div>
    <div class="table-scroll">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = '/api';
let chart = null;

// 상태
const ST = {
  platform: 'naver',  // 'naver' | 'meta'
  metric: 'spend',
  from: '', to: '',
  // 네이버 드릴다운
  nLevel: 'CAMPAIGN',
  nCampaignId: null, nAdgroupId: null,
  nCampaignName: '', nAdgroupName: '',
  // 메타 드릴다운
  mLevel: 'campaign',  // campaign | adset | ad
  mParentId: null,
  mPathNames: ['전체'],
  // 데이터
  daily: [],
  list: [],
};

// 초기 날짜: 최근 30일
const now = new Date();
ST.to = now.toISOString().split('T')[0];
now.setDate(now.getDate() - 30);
ST.from = now.toISOString().split('T')[0];
document.getElementById('dateFrom').value = ST.from;
document.getElementById('dateTo').value = ST.to;

// ============================================================
// 데이터 로드
// ============================================================
async function refresh() {
  hideErr();
  document.getElementById('statusText').textContent = '데이터 갱신 중...';
  document.getElementById('chartLoader').classList.add('show');
  document.getElementById('tableLoader').classList.add('show');

  try {
    if (ST.platform === 'naver') {
      await loadNaver();
    } else {
      await loadMeta();
    }
    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
    document.getElementById('statusText').textContent = '연결됨';
    render();
  } catch (e) {
    showErr('연결 오류: ' + e.message);
    document.getElementById('statusText').textContent = '연결 끊김';
  } finally {
    document.getElementById('chartLoader').classList.remove('show');
    document.getElementById('tableLoader').classList.remove('show');
  }
}

async function loadNaver() {
  const q = `dateFrom=${ST.from}&dateTo=${ST.to}`;

  // 차트 데이터
  let summaryUrl = `${API}/daily-summary?${q}`;
  if (ST.nLevel === 'ADGROUP') summaryUrl += `&idType=CAMPAIGN&targetId=${ST.nCampaignId}`;
  if (ST.nLevel === 'AD') summaryUrl += `&idType=ADGROUP&targetId=${ST.nAdgroupId}`;
  const sRes = await fetch(summaryUrl);
  ST.daily = await sRes.json();
  if (!Array.isArray(ST.daily)) ST.daily = [];

  // 테이블 데이터
  let listUrl = `${API}/campaign-stats?${q}`;
  if (ST.nLevel === 'ADGROUP') listUrl = `${API}/adgroups?campaignId=${ST.nCampaignId}&${q}`;
  if (ST.nLevel === 'AD') listUrl = `${API}/ads?adgroupId=${ST.nAdgroupId}&${q}`;
  const lRes = await fetch(listUrl);
  const lData = await lRes.json();
  ST.list = lData.rows || [];
}

async function loadMeta() {
  const since = ST.from;
  const until = ST.to;
  const level = ST.mLevel;
  const parentQ = ST.mParentId ? `&parentId=${ST.mParentId}` : '';

  // 차트 데이터
  const sRes = await fetch(`${API}/meta-daily?since=${since}&until=${until}&level=${level}${parentQ}`);
  const sData = await sRes.json();
  ST.daily = sData.data || [];

  // 테이블 데이터
  const lRes = await fetch(`${API}/meta-stats?since=${since}&until=${until}&level=${level}${parentQ}`);
  const lData = await lRes.json();
  ST.list = lData.data || [];
}

// ============================================================
// 렌더링
// ============================================================
function render() {
  renderSummary();
  renderChart();
  renderTable();
  renderBreadcrumb();
}

function renderSummary() {
  let s = 0, imp = 0, clk = 0, conv = 0, rev = 0;

  if (ST.platform === 'naver') {
    ST.list.forEach(r => {
      s += r.spend || 0;
      imp += r.impressions || 0;
      clk += r.clicks || 0;
      conv += r.conversions || 0;
      rev += r.revenue || 0;
    });
  } else {
    ST.list.forEach(r => {
      s += Number(r.spend || 0);
      imp += Number(r.impressions || 0);
      // inline_link_clicks 또는 actions의 link_click
      const ilc = Number(r.inline_link_clicks || 0);
      if (ilc > 0) { clk += ilc; }
      else {
        const linkClick = r.actions?.find(a => a.action_type === 'link_click');
        clk += Number(linkClick?.value || 0);
      }
      const purchase = r.actions?.find(a => a.action_type === 'purchase');
      conv += Number(purchase?.value || 0);
    });
  }

  const roas = s > 0 ? Math.round(rev / s * 100) : 0;

  document.getElementById('totSpend').textContent = '₩' + Math.floor(s).toLocaleString();
  document.getElementById('totImp').textContent = `${imp.toLocaleString()} / ${clk.toLocaleString()}`;
  document.getElementById('totConv').textContent = conv.toLocaleString();

  if (ST.platform === 'naver') {
    document.getElementById('totRev').textContent = `₩${Math.floor(rev).toLocaleString()} (${roas}%)`;
  } else {
    // 메타는 purchase_roas 사용
    let metaRoas = 0;
    if (ST.list.length > 0) {
      let totalSpend = 0, totalRevenue = 0;
      ST.list.forEach(r => {
        const sp = Number(r.spend || 0);
        const pr = r.purchase_roas?.[0]?.value || 0;
        totalSpend += sp;
        totalRevenue += sp * Number(pr);
      });
      metaRoas = totalSpend > 0 ? Math.round(totalRevenue / totalSpend * 100) : 0;
    }
    document.getElementById('totRev').textContent = `ROAS ${metaRoas}%`;
  }
}

function renderChart() {
  const wrap = document.querySelector('.chart-wrap');
  wrap.innerHTML = '<canvas id="mainChart"></canvas>';
  const ctx = document.getElementById('mainChart').getContext('2d');

  const labelMap = { spend: '광고비', clicks: '클릭', conversions: '전환', roas: 'ROAS' };
  document.getElementById('chartTitle').textContent = `일별 ${labelMap[ST.metric]} 추이 (${ST.platform === 'naver' ? '네이버' : '메타'})`;

  // 날짜 축 생성 (시차 버그 방지)
  const allDates = [];
  const curr = new Date(ST.from + 'T00:00:00');
  const end = new Date(ST.to + 'T00:00:00');
  while (curr <= end) {
    const y = curr.getFullYear();
    const m = String(curr.getMonth() + 1).padStart(2, '0');
    const d = String(curr.getDate()).padStart(2, '0');
    allDates.push(`${y}-${m}-${d}`);
    curr.setDate(curr.getDate() + 1);
  }

  let values;

  if (ST.platform === 'naver') {
    values = allDates.map(date => {
      const r = ST.daily.find(d => d.date_or_name === date);
      if (!r) return 0;
      if (ST.metric === 'spend') return r.cost || r.spend || 0;
      if (ST.metric === 'roas') return r.roas || 0;
      return r[ST.metric] || 0;
    });
  } else {
    values = allDates.map(date => {
      // date_start 또는 date_stop 기준으로 매칭
      const matched = ST.daily.filter(d => (d.date_start === date || d.date_stop === date));
      let sum = 0;
      matched.forEach(r => {
        if (ST.metric === 'spend') {
          sum += Number(r.spend || 0);
        } else if (ST.metric === 'clicks') {
          // inline_link_clicks 또는 actions에서 link_click 찾기
          const clk = Number(r.inline_link_clicks || 0);
          if (clk > 0) { sum += clk; }
          else {
            const linkClick = r.actions?.find(a => a.action_type === 'link_click');
            sum += Number(linkClick?.value || 0);
          }
        } else if (ST.metric === 'conversions') {
          const p = r.actions?.find(a => a.action_type === 'purchase');
          sum += Number(p?.value || 0);
        } else if (ST.metric === 'roas') {
          const pr = r.purchase_roas?.[0]?.value || 0;
          sum += Number(pr) * 100;
        }
      });
      return Math.round(sum * 100) / 100;
    });
  }

  const color = ST.platform === 'naver' ? '#00c73c' : '#1877f2';

  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: allDates.map(d => d.slice(5)),
      datasets: [{
        label: labelMap[ST.metric],
        data: values,
        borderColor: color,
        backgroundColor: color + '1a',
        fill: true, tension: 0.4, borderWidth: 2,
        pointRadius: allDates.length > 20 ? 0 : 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#5a6380', font: { size: 10 } } },
        y: { beginAtZero: true, grid: { color: 'rgba(46,54,80,0.4)' }, ticks: { color: '#5a6380', font: { size: 10 } } },
      }
    }
  });
}

function renderTable() {
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');

  if (ST.platform === 'naver') {
    document.getElementById('levelTag').textContent = ST.nLevel;
    document.getElementById('levelTag').className = 'tag green';

    thead.innerHTML = `<tr><th>목록명</th><th>광고비</th><th>노출</th><th>클릭</th><th>전환</th><th>매출</th><th>CTR</th><th>ROAS</th><th>CPC</th></tr>`;

    if (!ST.list.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">데이터가 없습니다</td></tr>';
      return;
    }

    tbody.innerHTML = ST.list.map(r => {
      const canDrill = ST.nLevel !== 'AD';
      return `<tr>
        <td class="${canDrill ? 'clickable' : ''}" ${canDrill ? `onclick="naverDrill('${r.id}','${escHtml(r.name)}')"` : ''}>
          ${escHtml(r.name)}
        </td>
        <td>₩${(r.spend || 0).toLocaleString()}</td>
        <td>${(r.impressions || 0).toLocaleString()}</td>
        <td>${(r.clicks || 0).toLocaleString()}</td>
        <td>${(r.conversions || 0).toLocaleString()}</td>
        <td>₩${(r.revenue || 0).toLocaleString()}</td>
        <td>${r.ctr || 0}%</td>
        <td style="color:${(r.roas || 0) > 500 ? 'var(--success)' : 'inherit'}">${r.roas || 0}%</td>
        <td>₩${(r.cpc || 0).toLocaleString()}</td>
      </tr>`;
    }).join('');
  } else {
    // 메타
    const levelLabel = ST.mLevel === 'campaign' ? 'CAMPAIGN' : ST.mLevel === 'adset' ? 'AD SET' : 'AD';
    document.getElementById('levelTag').textContent = levelLabel;
    document.getElementById('levelTag').className = 'tag blue';

    thead.innerHTML = `<tr><th>이름</th><th>지출</th><th>노출</th><th>도달</th><th>클릭</th><th>고유클릭</th><th>ROAS</th></tr>`;

    if (!ST.list.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">데이터가 없습니다</td></tr>';
      return;
    }

    tbody.innerHTML = ST.list.map(r => {
      const name = r.campaign_name || r.adset_name || r.ad_name || '이름없음';
      const id = r.campaign_id || r.adset_id || r.ad_id;
      const canDrill = ST.mLevel !== 'ad';
      const roas = r.purchase_roas ? (Number(r.purchase_roas[0]?.value || 0) * 100).toFixed(0) : '0';

      return `<tr>
        <td class="${canDrill ? 'clickable' : ''}" ${canDrill ? `onclick="metaDrill('${id}','${escHtml(name)}')"` : ''}>
          ${escHtml(name)}
        </td>
        <td>₩${Math.floor(Number(r.spend || 0)).toLocaleString()}</td>
        <td>${Number(r.impressions || 0).toLocaleString()}</td>
        <td>${Number(r.reach || 0).toLocaleString()}</td>
        <td>${Number(r.inline_link_clicks || 0).toLocaleString()}</td>
        <td>${Number(r.unique_inline_link_clicks || 0).toLocaleString()}</td>
        <td style="color:${Number(roas) > 200 ? 'var(--success)' : 'inherit'}">${roas}%</td>
      </tr>`;
    }).join('');
  }
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');

  if (ST.platform === 'naver') {
    let html = `<span class="bc-item ${ST.nLevel === 'CAMPAIGN' ? 'active' : ''}" onclick="naverGoLevel('CAMPAIGN')">캠페인 전체</span>`;
    if (ST.nLevel === 'ADGROUP' || ST.nLevel === 'AD') {
      html += `<span class="bc-sep">/</span><span class="bc-item ${ST.nLevel === 'ADGROUP' ? 'active' : ''}" onclick="naverGoLevel('ADGROUP')">${escHtml(ST.nCampaignName)}</span>`;
    }
    if (ST.nLevel === 'AD') {
      html += `<span class="bc-sep">/</span><span class="bc-item active">${escHtml(ST.nAdgroupName)}</span>`;
    }
    bc.innerHTML = html;
  } else {
    bc.innerHTML = ST.mPathNames.map((name, i) => {
      const isLast = i === ST.mPathNames.length - 1;
      return `<span class="bc-item ${isLast ? 'active' : ''}" onclick="metaGoLevel(${i})">${escHtml(name)}</span>`;
    }).join('<span class="bc-sep">/</span>');
  }
}

// ============================================================
// 네이버 드릴다운
// ============================================================
function naverDrill(id, name) {
  if (ST.nLevel === 'CAMPAIGN') {
    ST.nLevel = 'ADGROUP';
    ST.nCampaignId = id;
    ST.nCampaignName = name;
  } else if (ST.nLevel === 'ADGROUP') {
    ST.nLevel = 'AD';
    ST.nAdgroupId = id;
    ST.nAdgroupName = name;
  } else return;
  refresh();
}

function naverGoLevel(lv) {
  ST.nLevel = lv;
  if (lv === 'CAMPAIGN') { ST.nCampaignId = null; ST.nAdgroupId = null; }
  if (lv === 'ADGROUP') { ST.nAdgroupId = null; }
  refresh();
}

// ============================================================
// 메타 드릴다운
// ============================================================
function metaDrill(id, name) {
  if (ST.mLevel === 'campaign') {
    ST.mLevel = 'adset';
    ST.mParentId = id;
    ST.mPathNames.push(name);
  } else if (ST.mLevel === 'adset') {
    ST.mLevel = 'ad';
    ST.mParentId = id;
    ST.mPathNames.push(name);
  } else return;
  refresh();
}

function metaGoLevel(idx) {
  const levels = ['campaign', 'adset', 'ad'];
  ST.mLevel = levels[idx] || 'campaign';
  ST.mPathNames = ST.mPathNames.slice(0, idx + 1);
  ST.mParentId = idx === 0 ? null : ST.mParentId; // 간단 처리
  if (idx === 0) ST.mParentId = null;
  refresh();
}

// ============================================================
// 플랫폼 / 지표 전환
// ============================================================
document.getElementById('platformTabs').addEventListener('click', e => {
  const p = e.target.dataset.p;
  if (!p) return;
  ST.platform = p;
  document.querySelectorAll('#platformTabs .btn-tab').forEach(b => {
    b.classList.remove('active', 'c-naver', 'c-meta');
    if (b.dataset.p === p) {
      b.classList.add('active');
      b.classList.add(p === 'naver' ? 'c-naver' : 'c-meta');
    }
  });
  // 레벨 초기화
  ST.nLevel = 'CAMPAIGN'; ST.nCampaignId = null; ST.nAdgroupId = null;
  ST.mLevel = 'campaign'; ST.mParentId = null; ST.mPathNames = ['전체'];
  refresh();
});

document.getElementById('metricTabs').addEventListener('click', e => {
  if (!e.target.dataset.m) return;
  document.querySelectorAll('#metricTabs .btn-tab').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  ST.metric = e.target.dataset.m;
  renderChart();
});

document.getElementById('dateFrom').addEventListener('change', e => { ST.from = e.target.value; refresh(); });
document.getElementById('dateTo').addEventListener('change', e => { ST.to = e.target.value; refresh(); });

// ============================================================
// 유틸
// ============================================================
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function showErr(msg) { const b = document.getElementById('errBox'); b.textContent = msg; b.style.display = 'block'; }
function hideErr() { document.getElementById('errBox').style.display = 'none'; }

// 초기 로드 — 네이버 탭에 활성 색상 적용
document.querySelector('#platformTabs .btn-tab[data-p="naver"]').classList.add('c-naver');
refresh();
</script>
</body>
</html>
